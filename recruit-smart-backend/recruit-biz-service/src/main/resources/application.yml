server:
  port: 8080
spring:
  application:
    name: service-biz
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/recruit_smart?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    openfeign:
      client:
        config:
          recruit-ai-service:
            connect-timeout: 3000
            read-timeout: 60000
            logger-level: basic
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
logging:
  level:
    com.recruit.biz.mapper: debug
jwt:
  secret: recruit-smart-platform-secret-key-2026
  expire-time: 86400000
resume:
  storage:
    root-path: ${RESUME_STORAGE_PATH:./uploads/resumes}
    max-size: 10485760
knife4j:
  enable: true

springdoc:
  packages-to-scan: com.recruit.biz.controller
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
