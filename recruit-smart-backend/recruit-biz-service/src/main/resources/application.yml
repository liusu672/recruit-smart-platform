server:
  port: 8080
spring:
  application:
    name: service-biz
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/recruit_smart?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 741852963zxc
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    connection-timeout: 5000
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 2
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    openfeign:
      client:
        config:
          recruit-ai-service:
            connect-timeout: 10000
            read-timeout: 150000
            logger-level: basic
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
logging:
  level:
    com.recruit.biz.mapper: debug
jwt:
  secret: recruit-smart-platform-secret-key-2026
  expire-time: 86400000
resume:
  storage:
    root-path: ${RESUME_STORAGE_PATH:./uploads/resumes}
    max-size: 10485760
knife4j:
  enable: true

springdoc:
  packages-to-scan: com.recruit.biz.controller
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
