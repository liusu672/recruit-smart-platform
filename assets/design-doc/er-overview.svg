<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .box { fill: #fff; stroke: #374151; stroke-width: 2; }
      .line { fill: none; stroke: #4b5563; stroke-width: 2; }
      .title { font: 700 25px 'Microsoft YaHei', sans-serif; fill: #111827; }
      .label { font: 20px 'Microsoft YaHei', sans-serif; fill: #1f2937; text-anchor: middle; dominant-baseline: middle; }
      .cardinality { font: 17px 'Microsoft YaHei', sans-serif; fill: #4b5563; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="#fff"/>
  <text x="700" y="42" class="title" text-anchor="middle">招聘与人才管理平台总体 ER 关系图</text>

  <rect x="70" y="100" width="180" height="64" class="box"/><text x="160" y="132" class="label">系统角色</text>
  <rect x="350" y="100" width="180" height="64" class="box"/><text x="440" y="132" class="label">系统用户</text>
  <rect x="650" y="100" width="180" height="64" class="box"/><text x="740" y="132" class="label">候选人</text>
  <rect x="950" y="100" width="180" height="64" class="box"/><text x="1040" y="132" class="label">简历</text>

  <rect x="70" y="320" width="180" height="64" class="box"/><text x="160" y="352" class="label">职位</text>
  <rect x="350" y="320" width="180" height="64" class="box"/><text x="440" y="352" class="label">投递记录</text>
  <rect x="650" y="320" width="180" height="64" class="box"/><text x="740" y="352" class="label">AI 匹配结果</text>
  <rect x="950" y="320" width="180" height="64" class="box"/><text x="1040" y="352" class="label">面试安排</text>
  <rect x="1190" y="320" width="180" height="64" class="box"/><text x="1280" y="352" class="label">面试反馈</text>

  <rect x="350" y="570" width="180" height="64" class="box"/><text x="440" y="602" class="label">Offer</text>
  <rect x="650" y="570" width="180" height="64" class="box"/><text x="740" y="602" class="label">入职记录</text>
  <rect x="950" y="570" width="180" height="64" class="box"/><text x="1040" y="602" class="label">员工档案</text>

  <path d="M250 132 H350" class="line"/><text x="265" y="120" class="cardinality">1</text><text x="330" y="120" class="cardinality">N</text>
  <path d="M530 132 H650" class="line"/><text x="545" y="120" class="cardinality">1</text><text x="625" y="120" class="cardinality">0..1</text>
  <path d="M830 132 H950" class="line"/><text x="845" y="120" class="cardinality">1</text><text x="930" y="120" class="cardinality">N</text>

  <path d="M440 164 V235 H290 V352 H250" class="line"/><text x="300" y="220" class="cardinality">用户创建职位</text>
  <path d="M250 352 H350" class="line"/><text x="265" y="340" class="cardinality">1</text><text x="330" y="340" class="cardinality">N</text>
  <path d="M740 164 V250 H500 V320" class="line"/><text x="625" y="236" class="cardinality">候选人 1 : N 投递</text>
  <path d="M1040 164 V275 H490 V320" class="line"/><text x="850" y="264" class="cardinality">简历 1 : N 投递</text>

  <path d="M530 352 H650" class="line"/><text x="545" y="340" class="cardinality">1</text><text x="625" y="340" class="cardinality">0..1</text>
  <path d="M530 365 C700 450 870 445 950 365" class="line"/><text x="735" y="448" class="cardinality">1 : N</text>
  <path d="M1130 352 H1190" class="line"/><text x="1140" y="340" class="cardinality">1</text><text x="1170" y="340" class="cardinality">N</text>

  <path d="M440 384 V570" class="line"/><text x="450" y="470" class="cardinality">1 : 0..1</text>
  <path d="M530 602 H650" class="line"/><text x="545" y="590" class="cardinality">1</text><text x="625" y="590" class="cardinality">0..1</text>
  <path d="M830 602 H950" class="line"/><text x="845" y="590" class="cardinality">1</text><text x="925" y="590" class="cardinality">0..1</text>

  <text x="700" y="760" class="label">说明：当前 SQL 未声明物理外键，图中关系由索引、唯一约束和业务服务共同维护。</text>
</svg>
