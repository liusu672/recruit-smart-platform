<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .entity { fill: #fff; stroke: #374151; stroke-width: 3; }
      .attr { fill: #fff; stroke: #4b5563; stroke-width: 2; }
      .line { stroke: #4b5563; stroke-width: 2; }
      .title { font: 700 25px 'Microsoft YaHei', sans-serif; fill: #111827; }
      .text { font: 20px 'Microsoft YaHei', sans-serif; fill: #1f2937; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#fff"/>
